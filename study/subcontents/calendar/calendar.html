<!doctype html>
<html lang="ja">
    
    <link rel="stylesheet" href="./calendar.css">
    
    <script type="text/javascript" id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    
    <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">    

    <!-- フォント -->
    <link href='https://fonts.googleapis.com/css?family=DotGothic16' rel='stylesheet'>

    </head>

    <body>
        <div class = "header_bar">
            
            <div class = "tool_bar">
                <!-- ボタン -->
                <div class = "tool_bar_button" onclick="CalendarManager.go_back_year()">前の年</div>
                <div class = "tool_bar_button" onclick="CalendarManager.go_back_month()">前の月</div>
                <div class = "tool_bar_button" onclick="CalendarManager.go_next_month()">次の月</div>
                <div class = "tool_bar_button" onclick="CalendarManager.go_next_year()">次の年</div>

                <!-- 月の表示 -->
                <div class = "year_month_field" id = "YearMonthField"></div>
            </div>
            
            
            <!-- カレンダー -->
            <div class = "weekday_header">
                <div class = "weekday_header_item" style = "background-color: rgb(234, 140, 140);">Sun</div>
                <div class = "weekday_header_item">Mon</div>
                <div class = "weekday_header_item">Tue</div>
                <div class = "weekday_header_item">Wed</div>
                <div class = "weekday_header_item">Thu</div>
                <div class = "weekday_header_item">Fri</div>
                <div class = "weekday_header_item" style = "background-color: rgb(161, 179, 224);">Sat</div>
            </div>
        </div>
        <div class = "calendar_grid" id = "CalendarField"></div>
        
    </body>


</html>

<script src="./calendar.js"></script>
